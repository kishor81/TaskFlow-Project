<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --surface2: #f5f4f0;
    --border: #e8e6e0;
    --border-hover: #d0cdc5;
    --text: #1a1916;
    --text-2: #6b6860;
    --text-3: #a8a59e;
    --accent: #1a1916;
    --accent-hover: #333028;
    --green: #2d6a4f;
    --green-bg: #eaf4ee;
    --amber: #92400e;
    --amber-bg: #fef3c7;
    --red: #991b1b;
    --red-bg: #fee2e2;
    --blue: #1e40af;
    --blue-bg: #eff6ff;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow-md);
  }

  .auth-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 0.25rem;
    letter-spacing: -0.5px;
  }

  .auth-sub {
    color: var(--text-2);
    font-size: 13px;
    margin-bottom: 2rem;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .auth-tab {
    padding: 0.5rem 1rem;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    color: var(--text-2);
    transition: all 0.15s;
  }

  .auth-tab.active {
    color: var(--text);
    border-bottom-color: var(--text);
    font-weight: 500;
  }

  .form-group { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }

  input[type="text"], input[type="email"], input[type="password"], textarea, select {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--text);
  }

  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.6rem 1rem;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
  }

  .btn:hover { background: var(--surface2); border-color: var(--border-hover); }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
    width: 100%;
    justify-content: center;
    padding: 0.7rem 1rem;
  }

  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .btn-ghost {
    background: none;
    border-color: transparent;
    color: var(--text-2);
    padding: 0.4rem 0.6rem;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: transparent; }

  .btn-danger { color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); border-color: #fca5a5; color: var(--red); }

  /* ── APP LAYOUT ── */
  #app { display: none; min-height: 100vh; }

  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.25rem 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
    padding: 0 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
  }

  .sidebar-section {
    padding: 0 0.75rem;
    margin-bottom: 1.5rem;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    padding: 0 0.5rem;
    margin-bottom: 0.4rem;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.45rem 0.75rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-2);
    transition: all 0.12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
  }

  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: var(--surface2); color: var(--text); font-weight: 500; }

  .sidebar-item .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border-hover);
    flex-shrink: 0;
  }

  .project-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-3);
    padding: 1px 6px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 1rem 0.75rem 0;
    border-top: 1px solid var(--border);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius);
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; overflow-y: auto; }

  .main-header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    background: var(--surface);
  }

  .page-title {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--text);
  }

  .page-sub {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 2px;
  }

  .main-body { padding: 2rem 2.5rem; }

  /* ── CARDS / GRID ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }

  .project-card:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .project-card-name {
    font-weight: 500;
    font-size: 15px;
    margin-bottom: 0.35rem;
    color: var(--text);
  }

  .project-card-desc {
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .project-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .task-pill {
    font-size: 12px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .add-project-card {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-3);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
  }

  .add-project-card:hover {
    border-color: var(--border-hover);
    color: var(--text-2);
    background: var(--surface2);
  }

  /* ── TASK VIEW ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
    margin-bottom: 1.5rem;
    transition: color 0.12s;
  }

  .back-btn:hover { color: var(--text); }

  .task-filters {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.35rem 0.75rem;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.12s;
  }

  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .tasks-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    transition: all 0.12s;
    cursor: pointer;
  }

  .task-item:hover { border-color: var(--border-hover); }
  .task-item.completed { opacity: 0.55; }

  .task-checkbox {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border-hover);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    background: var(--surface);
  }

  .task-checkbox.checked {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }

  .task-checkbox.checked::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }

  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .task-item.completed .task-title { text-decoration: line-through; }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-high { background: var(--red-bg); color: var(--red); }
  .badge-medium { background: var(--amber-bg); color: var(--amber); }
  .badge-low { background: var(--green-bg); color: var(--green); }
  .badge-done { background: var(--green-bg); color: var(--green); }

  .due-date {
    font-size: 12px;
    color: var(--text-3);
  }

  .due-date.overdue { color: var(--red); }

  .task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; }
  .task-item:hover .task-actions { opacity: 1; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    backdrop-filter: blur(2px);
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 460px;
    box-shadow: var(--shadow-md);
    overflow: hidden;
  }

  .modal-header {
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    letter-spacing: -0.3px;
  }

  .modal-body { padding: 1.25rem 1.5rem; }

  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
  }

  /* ── EMPTY STATES ── */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-3);
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--text-2);
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .empty p { font-size: 13px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .stat-label { font-size: 12px; color: var(--text-3); margin-bottom: 0.25rem; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.5px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--text);
    color: #fff;
    padding: 0.65rem 1rem;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 200;
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
  }

  #toast.show { transform: translateY(0); opacity: 1; }

  /* ── LOADING ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    width: 80px;
  }

  .progress-bar {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">TaskFlow</div>
    <div class="auth-sub">Manage your work, simply.</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showAuthTab('login')">Sign in</button>
      <button class="auth-tab" onclick="showAuthTab('register')">Create account</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="login()" id="login-btn">Sign in</button>
    </div>

    <!-- Register -->
    <div id="register-form" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="yourname" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" />
      </div>
      <button class="btn btn-primary" onclick="register()" id="reg-btn">Create account</button>
    </div>

    <p id="auth-error" style="color:var(--red);font-size:12px;margin-top:0.75rem;" class="hidden"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ APP -->
<div id="app">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">TaskFlow</div>

      <div class="sidebar-section">
        <div class="sidebar-label">Views</div>
        <button class="sidebar-item active" id="nav-all" onclick="showAllProjects()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="10" y="1" width="5" height="5" rx="1"/><rect x="1" y="10" width="5" height="5" rx="1"/><rect x="10" y="10" width="5" height="5" rx="1"/></svg>
          All projects
        </button>
      </div>

      <div class="sidebar-section" style="flex:1;">
        <div class="sidebar-label">Projects</div>
        <div id="sidebar-projects"></div>
        <button class="sidebar-item" style="color:var(--text-3);" onclick="openProjectModal()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          New project
        </button>
      </div>

      <div class="sidebar-bottom">
        <div class="user-chip">
          <div class="avatar" id="user-avatar">?</div>
          <div style="flex:1;min-width:0;">
            <div id="user-name" style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            <div id="user-email" style="font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          </div>
          <button class="btn btn-ghost" style="padding:4px;" onclick="logout()" title="Sign out">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="11 11 14 8 11 5"/><line x1="14" y1="8" x2="6" y2="8"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main-area">
      <!-- content injected by JS -->
    </main>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ MODALS -->

<!-- Project Modal -->
<div id="project-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="project-modal-title">New project</div>
      <button class="btn btn-ghost" style="padding:4px;" onclick="closeModal('project-modal')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="project-modal-id" />
      <div class="form-group">
        <label>Project name</label>
        <input type="text" id="project-name-input" placeholder="e.g. Marketing website" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="project-desc-input" placeholder="What's this project about?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('project-modal')">Cancel</button>
      <button class="btn btn-primary" style="width:auto;" id="project-save-btn" onclick="saveProject()">Create project</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div id="task-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="task-modal-title">New task</div>
      <button class="btn btn-ghost" style="padding:4px;" onclick="closeModal('task-modal')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="task-modal-id" />
      <div class="form-group">
        <label>Task title</label>
        <input type="text" id="task-title-input" placeholder="What needs to be done?" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="task-desc-input" placeholder="Add some details…" style="min-height:60px;"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label>Priority</label>
          <select id="task-priority-input">
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Due date</label>
          <input type="date" id="task-due-input" />
        </div>
      </div>
      <div id="task-completed-row" class="form-group hidden" style="margin-top:0.75rem;margin-bottom:0;">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="task-completed-input" style="width:auto;" />
          Mark as completed
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('task-modal')">Cancel</button>
      <button class="btn btn-primary" style="width:auto;" id="task-save-btn" onclick="saveTask()">Add task</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:360px;">
    <div class="modal-header">
      <div class="modal-title">Delete project</div>
      <button class="btn btn-ghost" style="padding:4px;" onclick="closeModal('delete-modal')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-2);">This will permanently delete <strong id="delete-name"></strong> and all its tasks. This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" style="border-color:#fca5a5;" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5000/api';
let token = localStorage.getItem('tf_token');
let currentUser = JSON.parse(localStorage.getItem('tf_user') || 'null');
let projects = [];
let currentProjectId = null;
let deleteTarget = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
async function req(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (r.status === 204) return null;
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.title || data || 'Request failed');
  return data;
}

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? 'var(--red)' : 'var(--text)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function setLoading(btn, yes) {
  btn.disabled = yes;
  btn.dataset.orig = btn.dataset.orig || btn.textContent;
  btn.textContent = yes ? 'Saving…' : btn.dataset.orig;
}

function formatDate(d) {
  if (!d) return null;
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isOverdue(d) {
  if (!d) return false;
  return new Date(d) < new Date();
}

function priorityBadge(p) {
  const cls = { High: 'badge-high', Medium: 'badge-medium', Low: 'badge-low' };
  return `<span class="badge ${cls[p] || 'badge-medium'}">${p}</span>`;
}

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function showAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-error').classList.add('hidden');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAuthError('Please fill in all fields.');
  const btn = document.getElementById('login-btn');
  setLoading(btn, true);
  try {
    const data = await req('POST', '/auth/login', { email, password });
    onAuth(data);
  } catch (e) { showAuthError(e.message); }
  finally { setLoading(btn, false); }
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showAuthError('Please fill in all fields.');
  const btn = document.getElementById('reg-btn');
  setLoading(btn, true);
  try {
    const data = await req('POST', '/auth/register', { username, email, password });
    onAuth(data);
  } catch (e) { showAuthError(e.message); }
  finally { setLoading(btn, false); }
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function onAuth(data) {
  token = data.token;
  currentUser = { username: data.username, email: data.email };
  localStorage.setItem('tf_token', token);
  localStorage.setItem('tf_user', JSON.stringify(currentUser));
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setupUser();
  loadProjects();
}

function setupUser() {
  if (!currentUser) return;
  document.getElementById('user-name').textContent = currentUser.username;
  document.getElementById('user-email').textContent = currentUser.email;
  document.getElementById('user-avatar').textContent = initials(currentUser.username);
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('tf_token');
  localStorage.removeItem('tf_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── PROJECTS ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  try {
    projects = await req('GET', '/projects');
    renderSidebar();
    if (!currentProjectId) showAllProjects();
    else showProject(currentProjectId);
  } catch (e) { toast(e.message, true); }
}

function renderSidebar() {
  const el = document.getElementById('sidebar-projects');
  el.innerHTML = projects.map(p => `
    <button class="sidebar-item ${currentProjectId === p.id ? 'active' : ''}" onclick="showProject(${p.id})">
      <span class="dot"></span>
      <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</span>
      <span class="project-count">${p.taskCount}</span>
    </button>
  `).join('');
}

function showAllProjects() {
  currentProjectId = null;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-all').classList.add('active');
  renderSidebar();

  const total = projects.length;
  const totalTasks = projects.reduce((a, p) => a + p.taskCount, 0);

  const main = document.getElementById('main-area');
  main.innerHTML = `
    <div class="main-header">
      <div>
        <div class="page-title">All projects</div>
        <div class="page-sub">${total} project${total !== 1 ? 's' : ''} · ${totalTasks} task${totalTasks !== 1 ? 's' : ''}</div>
      </div>
      <button class="btn" onclick="openProjectModal()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        New project
      </button>
    </div>
    <div class="main-body">
      ${projects.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">◻</div>
          <h3>No projects yet</h3>
          <p>Create your first project to start tracking tasks.</p>
          <button class="btn" style="margin-top:1rem;" onclick="openProjectModal()">Create project</button>
        </div>
      ` : `
        <div class="projects-grid">
          ${projects.map(p => projectCard(p)).join('')}
          <button class="add-project-card" onclick="openProjectModal()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
            New project
          </button>
        </div>
      `}
    </div>
  `;
}

function projectCard(p) {
  const pct = p.taskCount > 0 ? Math.round((p.completedCount || 0) / p.taskCount * 100) : 0;
  return `
    <div class="project-card" onclick="showProject(${p.id})">
      <div class="project-card-name">${esc(p.name)}</div>
      <div class="project-card-desc">${esc(p.description) || '<span style="color:var(--text-3)">No description</span>'}</div>
      <div class="project-card-footer">
        <span class="task-pill">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2 5 6 9 14 3"/><path d="M14 8v5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4"/></svg>
          ${p.taskCount} task${p.taskCount !== 1 ? 's' : ''}
        </span>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
      </div>
    </div>
  `;
}

// ── PROJECT MODAL ─────────────────────────────────────────────────────────────
function openProjectModal(id) {
  const isEdit = !!id;
  const p = isEdit ? projects.find(x => x.id === id) : null;
  document.getElementById('project-modal-title').textContent = isEdit ? 'Edit project' : 'New project';
  document.getElementById('project-save-btn').textContent = isEdit ? 'Save changes' : 'Create project';
  document.getElementById('project-modal-id').value = id || '';
  document.getElementById('project-name-input').value = p ? p.name : '';
  document.getElementById('project-desc-input').value = p ? p.description : '';
  document.getElementById('project-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('project-name-input').focus(), 50);
}

async function saveProject() {
  const id = document.getElementById('project-modal-id').value;
  const name = document.getElementById('project-name-input').value.trim();
  const description = document.getElementById('project-desc-input').value.trim();
  if (!name) return toast('Project name is required.', true);
  const btn = document.getElementById('project-save-btn');
  setLoading(btn, true);
  try {
    if (id) {
      await req('PUT', `/projects/${id}`, { name, description });
      toast('Project updated.');
    } else {
      await req('POST', '/projects', { name, description });
      toast('Project created.');
    }
    closeModal('project-modal');
    loadProjects();
  } catch (e) { toast(e.message, true); }
  finally { setLoading(btn, false); }
}

// ── PROJECT VIEW ──────────────────────────────────────────────────────────────
let taskFilter = 'all';
let currentTasks = [];

async function showProject(id) {
  currentProjectId = id;
  taskFilter = 'all';
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-all').classList.remove('active');
  renderSidebar();

  const project = projects.find(p => p.id === id);
  const main = document.getElementById('main-area');

  main.innerHTML = `
    <div class="main-header">
      <div>
        <div class="page-title">${esc(project?.name || 'Project')}</div>
        <div class="page-sub">${esc(project?.description || '')}</div>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <button class="btn btn-ghost" onclick="openProjectModal(${id})" title="Edit project">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>
        </button>
        <button class="btn btn-ghost btn-danger" onclick="openDeleteModal(${id})" title="Delete project">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2 4 14 4"/><path d="M5 4V2h6v2"/><path d="M6 7v5M10 7v5"/><path d="M3 4l1 10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-10"/></svg>
        </button>
        <button class="btn" onclick="openTaskModal()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          Add task
        </button>
      </div>
    </div>
    <div class="main-body">
      <div id="stats-area" class="stats-row"></div>
      <div class="task-filters" id="filter-row"></div>
      <div id="tasks-area"><div style="text-align:center;padding:2rem;"><span class="spinner"></span></div></div>
    </div>
  `;

  await loadTasks(id);
}

async function loadTasks(projectId) {
  try {
    currentTasks = await req('GET', `/projects/${projectId}/tasks`);
    renderTaskStats();
    renderFilterRow();
    renderTasks();
  } catch (e) { toast(e.message, true); }
}

function renderTaskStats() {
  const total = currentTasks.length;
  const done = currentTasks.filter(t => t.isCompleted).length;
  const high = currentTasks.filter(t => t.priority === 'High' && !t.isCompleted).length;
  const overdue = currentTasks.filter(t => !t.isCompleted && isOverdue(t.dueDate)).length;

  document.getElementById('stats-area').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">${done}</div></div>
    <div class="stat-card"><div class="stat-label">High priority</div><div class="stat-value">${high}</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" style="${overdue > 0 ? 'color:var(--red)' : ''}">${overdue}</div></div>
  `;
}

function renderFilterRow() {
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'active', label: 'Active' },
    { key: 'completed', label: 'Completed' },
    { key: 'High', label: 'High priority' },
    { key: 'overdue', label: 'Overdue' },
  ];

  document.getElementById('filter-row').innerHTML = filters.map(f =>
    `<button class="filter-btn ${taskFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

function setFilter(f) {
  taskFilter = f;
  renderFilterRow();
  renderTasks();
}

function renderTasks() {
  let filtered = currentTasks;
  if (taskFilter === 'active') filtered = filtered.filter(t => !t.isCompleted);
  else if (taskFilter === 'completed') filtered = filtered.filter(t => t.isCompleted);
  else if (taskFilter === 'High') filtered = filtered.filter(t => t.priority === 'High' && !t.isCompleted);
  else if (taskFilter === 'overdue') filtered = filtered.filter(t => !t.isCompleted && isOverdue(t.dueDate));

  const el = document.getElementById('tasks-area');
  if (filtered.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✓</div>
        <h3>${currentTasks.length === 0 ? 'No tasks yet' : 'Nothing here'}</h3>
        <p>${currentTasks.length === 0 ? 'Add your first task to get started.' : 'Try a different filter.'}</p>
        ${currentTasks.length === 0 ? `<button class="btn" style="margin-top:1rem;" onclick="openTaskModal()">Add task</button>` : ''}
      </div>
    `;
    return;
  }

  el.innerHTML = `<div class="tasks-list">${filtered.map(t => taskRow(t)).join('')}</div>`;
}

function taskRow(t) {
  const due = formatDate(t.dueDate);
  const over = !t.isCompleted && isOverdue(t.dueDate);
  return `
    <div class="task-item ${t.isCompleted ? 'completed' : ''}" id="task-row-${t.id}">
      <div class="task-checkbox ${t.isCompleted ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          ${priorityBadge(t.priority)}
          ${due ? `<span class="due-date ${over ? 'overdue' : ''}">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:2px"><rect x="2" y="3" width="12" height="11" rx="1"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
            ${due}
          </span>` : ''}
          ${t.isCompleted ? `<span class="badge badge-done">Done</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="btn btn-ghost" style="padding:4px;" onclick="openTaskModal(${t.id})" title="Edit">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>
        </button>
        <button class="btn btn-ghost btn-danger" style="padding:4px;" onclick="deleteTask(${t.id})" title="Delete">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2 4 14 4"/><path d="M5 4V2h6v2"/><path d="M6 7v5M10 7v5"/><path d="M3 4l1 10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-10"/></svg>
        </button>
      </div>
    </div>
  `;
}

async function toggleTask(id) {
  const task = currentTasks.find(t => t.id === id);
  if (!task) return;
  try {
    await req('PUT', `/projects/${currentProjectId}/tasks/${id}`, {
      title: task.title,
      description: task.description,
      priority: task.priority,
      isCompleted: !task.isCompleted,
      dueDate: task.dueDate
    });
    task.isCompleted = !task.isCompleted;
    renderTaskStats();
    renderTasks();
    loadProjects();
  } catch (e) { toast(e.message, true); }
}

// ── TASK MODAL ────────────────────────────────────────────────────────────────
function openTaskModal(id) {
  const isEdit = !!id;
  const t = isEdit ? currentTasks.find(x => x.id === id) : null;
  document.getElementById('task-modal-title').textContent = isEdit ? 'Edit task' : 'New task';
  document.getElementById('task-save-btn').textContent = isEdit ? 'Save changes' : 'Add task';
  document.getElementById('task-modal-id').value = id || '';
  document.getElementById('task-title-input').value = t ? t.title : '';
  document.getElementById('task-desc-input').value = t ? t.description : '';
  document.getElementById('task-priority-input').value = t ? t.priority : 'Medium';
  document.getElementById('task-due-input').value = t?.dueDate ? t.dueDate.slice(0, 10) : '';
  const compRow = document.getElementById('task-completed-row');
  compRow.classList.toggle('hidden', !isEdit);
  if (isEdit) document.getElementById('task-completed-input').checked = t.isCompleted;
  document.getElementById('task-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('task-title-input').focus(), 50);
}

async function saveTask() {
  const id = document.getElementById('task-modal-id').value;
  const title = document.getElementById('task-title-input').value.trim();
  const description = document.getElementById('task-desc-input').value.trim();
  const priority = document.getElementById('task-priority-input').value;
  const dueDate = document.getElementById('task-due-input').value || null;
  const isCompleted = document.getElementById('task-completed-input').checked;
  if (!title) return toast('Task title is required.', true);
  const btn = document.getElementById('task-save-btn');
  setLoading(btn, true);
  try {
    if (id) {
      await req('PUT', `/projects/${currentProjectId}/tasks/${id}`, {
        title, description, priority, isCompleted, dueDate
      });
      toast('Task updated.');
    } else {
      await req('POST', `/projects/${currentProjectId}/tasks`, {
        title, description, priority, dueDate
      });
      toast('Task added.');
    }
    closeModal('task-modal');
    await loadTasks(currentProjectId);
    loadProjects();
  } catch (e) { toast(e.message, true); }
  finally { setLoading(btn, false); }
}

async function deleteTask(id) {
  try {
    await req('DELETE', `/projects/${currentProjectId}/tasks/${id}`);
    currentTasks = currentTasks.filter(t => t.id !== id);
    renderTaskStats();
    renderTasks();
    loadProjects();
    toast('Task deleted.');
  } catch (e) { toast(e.message, true); }
}

// ── DELETE PROJECT ────────────────────────────────────────────────────────────
function openDeleteModal(id) {
  const p = projects.find(x => x.id === id);
  document.getElementById('delete-name').textContent = p?.name || 'this project';
  deleteTarget = id;
  document.getElementById('delete-modal').classList.remove('hidden');
}

async function confirmDelete() {
  if (!deleteTarget) return;
  try {
    await req('DELETE', `/projects/${deleteTarget}`);
    toast('Project deleted.');
    closeModal('delete-modal');
    currentProjectId = null;
    deleteTarget = null;
    await loadProjects();
    showAllProjects();
  } catch (e) { toast(e.message, true); }
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['project-modal','task-modal','delete-modal'].forEach(closeModal);
  }
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
    if (!document.getElementById('project-modal').classList.contains('hidden')) saveProject();
    else if (!document.getElementById('task-modal').classList.contains('hidden')) saveTask();
    else if (!document.getElementById('login-form').classList.contains('hidden')) login();
    else if (!document.getElementById('register-form').classList.contains('hidden')) register();
  }
});

// ── ESCAPE HTML ───────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if (token && currentUser) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setupUser();
  loadProjects();
}
